        - paragraph [ref=e26]: Our Story
        - heading "Built on Service. Proven by Performance." [level=2] [ref=e27]
        - paragraph [ref=e28]: "Bonram (Pty) Ltd was established in 2013 in Lephalale, Limpopo — a strategic hub at the heart of South Africa's energy and mining corridor. From day one, our mandate was clear: deliver government-grade service quality to corporate and institutional clients across every sector we operate in."
        - paragraph [ref=e29]: Over a decade later, we have grown from a single-service contractor to a multi-division B2B services company with 5 national offices, 11 industry accreditations, and a client portfolio that includes Eskom, ArcelorMittal, Enel Green Power, EXXARO, and multiple national and provincial government departments.
        - paragraph [ref=e30]: Our BBBEE Level 1 status is not just a compliance badge — it reflects our foundational commitment to transformation, community empowerment, and building a more inclusive South African economy.
      - generic [ref=e31]:
        - generic [ref=e32]:
          - paragraph [ref=e33]: Our Vision
